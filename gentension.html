<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulation Induction - Lycée Albert Einstein</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #dfe6e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            user-select: none;
        }

        h2 { color: #2d3436; margin-bottom: 20px; }

        .canvas-container {
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        canvas {
            border: 1px solid #b2bec3;
            border-radius: 8px;
            background: radial-gradient(circle at 30% 50%, #f7f9fa 0%, #ecf0f1 100%);
            cursor: default;
        }

        .controls {
            margin-top: 20px;
            background: white;
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-item { display: flex; flex-direction: column; gap: 5px; }
        .control-row { display: flex; align-items: center; gap: 8px; cursor: pointer; background: #f1f2f6; padding: 5px 15px; border-radius: 20px;}
        
        button {
            padding: 10px 25px;
            background: #d63031;
            color: white; border: none; border-radius: 25px;
            cursor: pointer; font-weight: bold; font-size: 1rem;
            transition: background 0.2s;
        }
        button:hover { background: #c0392b; }
        
        label { font-weight: 600; color: #636e72; font-size: 0.9rem; cursor: pointer;}
        input[type=checkbox] { cursor: pointer; transform: scale(1.2); }
    </style>
</head>
<body>

    <h2>Laboratoire : Loi de Faraday</h2>

    <div class="canvas-container">
        <canvas id="mainCanvas" width="900" height="500"></canvas>
    </div>

    <div class="controls">
        <div class="control-item">
            <label>Vitesse de rotation (ω)</label>
            <input type="range" id="speedSlider" min="0" max="20" value="4" step="0.5" style="width:180px">
        </div>

        <div class="control-row">
            <input type="checkbox" id="checkField" checked>
            <label for="checkField">Fond (Dipôles)</label>
        </div>

        <div class="control-row">
            <input type="checkbox" id="checkVector" checked>
            <label for="checkVector" style="color:#00b894">Vecteur B (Bobine)</label>
        </div>

        <button onclick="resetLab()">Réinitialiser</button>
    </div>

<script>
/**
 * SIMULATION INDUCTION ÉLECTROMAGNÉTIQUE
 * Auteur : Espinosa T. (Lycée Albert Einstein)
 * Version : V8 (Finale avec Hint & Toggle B)
 */

const cvs = document.getElementById('mainCanvas');
const ctx = cvs.getContext('2d');

// --- CONFIGURATION SCÈNE ---
const SCENE = {
    magnet: { w: 100, h: 34 },
    coil: { x: 450, y: 250, r: 40, width: 70, turns: 14 }, 
    scope: { x: 580, y: 80, w: 300, h: 340 }, 
    physics: { strength: 60000, gain: 4000, gridStep: 40 }
};

// --- ÉTAT INITIAL ---
let state = {
    mag: { x: 250, y: 250, angle: 0 },
    speed: 0.04,
    lastFlux: 0,
    isDragging: false,
    hasInteracted: false, // Pour savoir si on affiche l'aide
    dragOff: {x:0, y:0},
    showField: true,
    showVector: true, // Nouvelle option
    trace: new Array(250).fill(0),
    time: 0
};

// --- PHYSIQUE ---
function getFieldAt(x, y) {
    let dx = x - state.mag.x;
    let dy = y - state.mag.y;
    let distSq = dx*dx + dy*dy;
    let dist = Math.sqrt(distSq);
    if(dist < 20) dist = 20;

    let mx = Math.cos(state.mag.angle);
    let my = Math.sin(state.mag.angle);

    // Modèle dipôle 2D
    let k = SCENE.physics.strength / (distSq * dist);
    let dot = mx*dx + my*dy;

    return {
        x: k * (3 * dot * dx/distSq - mx),
        y: k * (3 * dot * dy/distSq - my)
    };
}

function update() {
    state.time += 0.05;

    // Rotation
    if(!state.isDragging) {
        state.mag.angle += state.speed;
    }

    // Flux bobine (Axe X)
    let b = getFieldAt(SCENE.coil.x, SCENE.coil.y);
    let flux = -b.x;

    // e = -dPhi/dt
    let dFlux = flux - state.lastFlux;
    state.lastFlux = flux;
    
    let v = dFlux * SCENE.physics.gain;
    
    // Saturation
    if(v > 100) v = 100;
    if(v < -100) v = -100;

    state.trace.push(v);
    state.trace.shift();
}

// --- DESSIN ---

function drawDipoles() {
    if(!state.showField) return;
    ctx.strokeStyle = "rgba(100, 110, 120, 0.2)";
    ctx.lineWidth = 1;

    for(let i=20; i < SCENE.scope.x - 20; i += SCENE.physics.gridStep) {
        for(let j=20; j < cvs.height; j += SCENE.physics.gridStep) {
            if(Math.hypot(i - state.mag.x, j - state.mag.y) < 60) continue;

            let b = getFieldAt(i, j);
            let a = Math.atan2(b.y, b.x);

            ctx.save();
            ctx.translate(i, j);
            ctx.rotate(a);
            ctx.beginPath();
            ctx.moveTo(-6,0); ctx.lineTo(6,0);
            ctx.moveTo(3,-3); ctx.lineTo(6,0); ctx.lineTo(3,3);
            ctx.stroke();
            ctx.restore();
        }
    }
}

function drawHint() {
    if(state.hasInteracted) return;

    // Effet de pulsation (opacité)
    let alpha = 0.6 + 0.4 * Math.sin(state.time * 2);
    
    ctx.save();
    ctx.fillStyle = `rgba(214, 48, 49, ${alpha})`;
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    
    // Texte sous l'aimant
    ctx.fillText("✋ Déplacez-moi !", state.mag.x, state.mag.y + 45);
    ctx.restore();
}

function drawMagnet() {
    ctx.save();
    ctx.translate(state.mag.x, state.mag.y);
    ctx.rotate(state.mag.angle);
    
    let w = SCENE.magnet.w;
    let h = SCENE.magnet.h;

    ctx.shadowColor = "rgba(0,0,0,0.3)";
    ctx.shadowBlur = 10;
    
    // N
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(0, -h/2, w/2, h);
    // S
    ctx.fillStyle = "#2980b9";
    ctx.fillRect(-w/2, -h/2, w/2, h);

    ctx.shadowBlur = 0;
    ctx.fillStyle = "white";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("N", w/4, 0);
    ctx.fillText("S", -w/4, 0);

    ctx.restore();
}

function drawCoil() {
    let c = SCENE.coil;
    
    // Étiquette Bobine
    ctx.fillStyle = "#636e72";
    ctx.font = "14px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Bobine", c.x, c.y + c.r + 35);

    // Spire par spire
    let step = c.width / c.turns;
    let grad = ctx.createLinearGradient(0, c.y - c.r, 0, c.y + c.r);
    grad.addColorStop(0, "#6d4c41");
    grad.addColorStop(0.5, "#e17055");
    grad.addColorStop(1, "#6d4c41");

    for(let k=0; k<c.turns; k++) {
        let cx = (c.x - c.width/2) + k*step;
        ctx.fillStyle = grad;
        ctx.strokeStyle = "rgba(0,0,0,0.15)";
        ctx.beginPath();
        ctx.ellipse(cx, c.y, step/1.4, c.r, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();
    }
}

function drawWires() {
    let c = SCENE.coil;
    let s = SCENE.scope;
    
    ctx.lineWidth = 3;
    ctx.lineCap = "round";

    // Fil Rouge
    ctx.strokeStyle = "#ff7675"; 
    ctx.beginPath();
    ctx.moveTo(c.x + c.width/2, c.y - c.r + 5);
    ctx.bezierCurveTo(c.x + 80, c.y - c.r, s.x - 40, s.y + 120, s.x + 25, s.y + 120);
    ctx.stroke();

    // Fil Noir
    ctx.strokeStyle = "#2d3436";
    ctx.beginPath();
    ctx.moveTo(c.x + c.width/2, c.y + c.r - 5);
    ctx.bezierCurveTo(c.x + 80, c.y + c.r, s.x - 40, s.y + 200, s.x + 25, s.y + 200);
    ctx.stroke();
}

function drawGreenVector() {
    if(!state.showVector) return; // Toggle check

    let b = getFieldAt(SCENE.coil.x, SCENE.coil.y);
    let scale = 5000;
    
    let cx = SCENE.coil.x;
    let cy = SCENE.coil.y;
    let ex = cx + b.x * scale;
    let ey = cy + b.y * scale;

    ctx.save();
    ctx.strokeStyle = "#00b894"; // Vert
    ctx.fillStyle = "#00b894";
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(ex, ey);
    ctx.stroke();

    // Pointe
    let ang = Math.atan2(ey-cy, ex-cx);
    ctx.translate(ex, ey);
    ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.lineTo(-10, -5); ctx.lineTo(-10, 5);
    ctx.fill();
    
    // Texte B
    ctx.rotate(-ang);
    ctx.fillStyle = "#006266";
    ctx.font = "bold 16px Arial";
    ctx.fillText("B", 15, -10);

    ctx.restore();
}

function drawOscilloscope() {
    let s = SCENE.scope;
    
    // Boitier
    ctx.fillStyle = "#b2bec3";
    ctx.fillRect(s.x, s.y, s.w, s.h);
    ctx.strokeStyle = "#636e72";
    ctx.lineWidth = 2;
    ctx.strokeRect(s.x, s.y, s.w, s.h);

    // Titre Oscillo
    ctx.fillStyle = "#636e72";
    ctx.font = "italic bold 18px Arial";
    ctx.textAlign = "center";
    ctx.fillText("OSCILLOSCOPE", s.x + s.w/2 + 20, s.y + 280);
    ctx.font = "14px Arial";
    ctx.fillText("NUMÉRIQUE", s.x + s.w/2 + 20, s.y + 300);

    // Écran
    let sx = s.x + 50; 
    let sy = s.y + 30;
    let sw = 230;
    let sh = 200;
    
    ctx.fillStyle = "#2d3436";
    ctx.fillRect(sx, sy, sw, sh);
    ctx.strokeRect(sx, sy, sw, sh);

    // Grille
    ctx.strokeStyle = "#636e72";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx, sy + sh/2); ctx.lineTo(sx+sw, sy + sh/2); 
    ctx.moveTo(sx + sw/2, sy); ctx.lineTo(sx+sw/2, sy + sh); 
    ctx.stroke();

    // Trace
    ctx.save();
    ctx.beginPath();
    ctx.rect(sx, sy, sw, sh);
    ctx.clip();
    
    ctx.strokeStyle = "#00cec9"; // Cyan
    ctx.lineWidth = 2;
    ctx.shadowColor = "#00cec9";
    ctx.shadowBlur = 4;
    
    ctx.beginPath();
    let xStep = sw / state.trace.length;
    for(let i=0; i < state.trace.length; i++) {
        let px = sx + i * xStep;
        let py = (sy + sh/2) - state.trace[i];
        if(i===0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();

    // Connecteurs
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#d63031";
    ctx.beginPath(); ctx.arc(s.x + 25, s.y + 120, 8, 0, Math.PI*2); ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#2d3436";
    ctx.beginPath(); ctx.arc(s.x + 25, s.y + 200, 8, 0, Math.PI*2); ctx.fill();
    ctx.stroke();
}

function drawCredits() {
    ctx.fillStyle = "#b2bec3";
    ctx.font = "italic 12px Arial";
    ctx.textAlign = "right";
    ctx.fillText("(Espinosa T. Lycée Albert Einstein)", cvs.width - 15, cvs.height - 15);
}

// --- BOUCLE ---

function loop() {
    update();
    
    ctx.clearRect(0, 0, cvs.width, cvs.height);

    drawDipoles();
    drawWires();       
    drawOscilloscope();
    drawCoil();        
    drawGreenVector(); 
    drawMagnet();
    drawHint(); // Aide visuelle
    drawCredits();

    requestAnimationFrame(loop);
}

// --- INTERACTION ---

cvs.addEventListener('mousedown', e => {
    let r = cvs.getBoundingClientRect();
    let mx = e.clientX - r.left;
    let my = e.clientY - r.top;

    if(Math.hypot(mx - state.mag.x, my - state.mag.y) < 60) {
        state.isDragging = true;
        state.hasInteracted = true; // Stop l'aide visuelle
        state.dragOff = { x: mx - state.mag.x, y: my - state.mag.y };
        cvs.style.cursor = "grabbing";
    }
});

window.addEventListener('mouseup', () => {
    state.isDragging = false;
    cvs.style.cursor = "default";
});

window.addEventListener('mousemove', e => {
    let r = cvs.getBoundingClientRect();
    let mx = e.clientX - r.left;
    let my = e.clientY - r.top;

    if(state.isDragging) {
        if(mx < 50) mx = 50; if(mx > 850) mx = 850;
        if(my < 50) my = 50; if(my > 450) my = 450;
        state.mag.x = mx - state.dragOff.x;
        state.mag.y = my - state.dragOff.y;
    } else {
        if(Math.hypot(mx - state.mag.x, my - state.mag.y) < 60) {
            cvs.style.cursor = "grab";
        } else {
            cvs.style.cursor = "default";
        }
    }
});

document.getElementById('speedSlider').addEventListener('input', e => {
    state.speed = e.target.value / 100;
});
document.getElementById('checkField').addEventListener('change', e => {
    state.showField = e.target.checked;
});
document.getElementById('checkVector').addEventListener('change', e => {
    state.showVector = e.target.checked;
});

window.resetLab = () => {
    state.mag.x = 250; state.mag.y = 250;
    state.hasInteracted = false; // Réactive l'aide
    state.trace.fill(0);
};

// --- START ---
loop();

</script>
</body>
</html>
